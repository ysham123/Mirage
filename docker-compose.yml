version: "3.8"

services:
  proxy:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./examples:/app/examples
      - ./artifacts:/app/artifacts
    environment:
      - PYTHONUNBUFFERED=1
      - MIRAGE_MOCKS_PATH=/app/examples/procurement_harness/mocks.yaml
      - MIRAGE_POLICIES_PATH=/app/examples/procurement_harness/policies.yaml
